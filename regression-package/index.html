<script>
(function(){
  if (window.__hdhNlpopInit) { return; } // 防止同頁重複注入導致事件重複綁定
  window.__hdhNlpopInit = true;

  var fab         = document.getElementById('hdh-nlpop-fab');
  var overlay     = document.getElementById('hdh-nlpop-overlay');
  var closeBt     = document.getElementById('hdh-nlpop-close');
  var bubble      = document.getElementById('hdh-nlpop-bubble');
  var form        = document.getElementById('hdh-nlpop-form');
  var sink        = document.getElementById('hdh-nlpop-sink');
  var formview    = document.getElementById('hdh-nlpop-formview');
  var successview = document.getElementById('hdh-nlpop-successview');
  var emailInput  = document.getElementById('hdh-nlpop-email');

  var bubbleHideTimer = null;
  var pendingSubmit = false; // 用來分辨隱藏 iframe 觸發的 load 是「頁面初始空白載入」還是「表單真的送出後」
  var savedOverflow = ''; // 開窗前 body overflow 的原值，關窗時還原（避免覆蓋頁面既有設定）

  /* ---------- Modal 開關 ---------- */
  function resetToForm(){
    if (successview) { successview.hidden = true; }
    if (formview) { formview.hidden = false; }
    if (form) { form.reset(); }
  }

  function openModal(){
    hideBubble();
    resetToForm(); // 每次開窗都回到表單初始態（即使上次是送出成功後關閉的）
    overlay.hidden = false;
    if (fab) { fab.style.display = 'none'; } // 開啟時隱藏浮動鈕，避免與遮罩重疊
    savedOverflow = document.body.style.overflow; // 先存舊值，關窗時還原（而非清空）
    document.body.style.overflow = 'hidden';
    window.requestAnimationFrame(function(){
      overlay.classList.add('hdh-nlpop-show');
    });
    if (emailInput) { setTimeout(function(){ emailInput.focus(); }, 260); }
  }

  function closeModal(){
    overlay.classList.remove('hdh-nlpop-show');
    document.body.style.overflow = savedOverflow; // 還原成開窗前的原值
    if (fab) { fab.style.display = ''; } // 關閉時還原浮動鈕
    setTimeout(function(){ overlay.hidden = true; }, 260);
  }

  if (fab)     { fab.addEventListener('click', openModal); }
  if (closeBt) { closeBt.addEventListener('click', closeModal); }
  if (overlay) {
    overlay.addEventListener('click', function(e){
      if (e.target === overlay) { closeModal(); }
    });
  }
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && overlay && !overlay.hidden) { closeModal(); }
  });

  /* ---------- 一次性提示氣泡（localStorage 只顯示一次） ---------- */
  function showBubble(){
    if (!bubble) { return; }
    bubble.hidden = false;
    window.requestAnimationFrame(function(){
      bubble.classList.add('hdh-nlpop-bubble-show');
    });
    bubbleHideTimer = setTimeout(hideBubble, 5000);
    try { localStorage.setItem('hdh_nlpop_bubble_seen', '1'); } catch (e) { /* 無痕模式等限制，忽略 */ }
  }

  function hideBubble(){
    if (!bubble || bubble.hidden) { return; }
    bubble.classList.remove('hdh-nlpop-bubble-show');
    if (bubbleHideTimer) { clearTimeout(bubbleHideTimer); bubbleHideTimer = null; }
    setTimeout(function(){ if (bubble) { bubble.hidden = true; } }, 300);
  }

  (function initBubble(){
    if (!bubble) { return; }
    var isMobile = window.matchMedia && window.matchMedia('(max-width: 480px)').matches;
    if (isMobile) { return; } // 手機版不顯示氣泡，避免遮擋內容

    var seen = null;
    try { seen = localStorage.getItem('hdh_nlpop_bubble_seen'); } catch (e) { /* 忽略 */ }
    if (seen) { return; } // 已顯示過，不再彈出

    setTimeout(function(){
      if (!overlay.hidden) { return; } // 若使用者已自行開窗，就不再彈出氣泡
      showBubble();
    }, 2000);

    bubble.addEventListener('click', openModal);
  })();

  /* ---------- 送出不離頁：隱藏 iframe + 在地成功訊息 ---------- */
  if (form) {
    form.addEventListener('submit', function(e){
      if (!emailInput || !emailInput.checkValidity || !emailInput.checkValidity()) {
        e.preventDefault(); // email 未通過必填/格式檢查，阻擋送出並顯示原生提示
        if (emailInput && typeof emailInput.reportValidity === 'function') {
          emailInput.reportValidity();
        }
        return;
      }
      pendingSubmit = true; // 標記「即將送往隱藏 iframe」，供下方 sink.onload 判斷
      // 不呼叫 preventDefault：讓表單正常 POST 到 target=hdh-nlpop-sink，畫面不跳轉
    });
  }

  if (sink) {
    sink.addEventListener('load', function(){
      if (!pendingSubmit) { return; } // 忽略頁面初始的空白載入（about:blank），避免誤顯示成功
      pendingSubmit = false;
      if (formview) { formview.hidden = true; }
      if (successview) { successview.hidden = false; }
    });
  }
})();
</script>
</div>
<!-- ============================================================
  匯東華訂閱浮動按鈕 / Pop-up 片段結束
============================================================ -->
